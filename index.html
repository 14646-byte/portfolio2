href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt',sans-serif;
scroll-behavior:smooth;
}

body{

background:linear-gradient(135deg,#ffe4ef,#ffd6e8,#fff5fa);

overflow-x:hidden;

color:#444;

}

/* Background */

body::before{

content:"";

position:fixed;

width:700px;

height:700px;

background:#ffb6d5;

border-radius:50%;

filter:blur(180px);

left:-220px;

top:-220px;

opacity:.45;

z-index:-2;

}

body::after{

content:"";

position:fixed;

width:650px;

height:650px;

background:#ffc9df;

border-radius:50%;

filter:blur(180px);

right:-220px;

bottom:-220px;

opacity:.45;

z-index:-2;

}

/* Navbar */

header{

position:fixed;

top:0;

left:0;

width:100%;

padding:20px 8%;

display:flex;

justify-content:space-between;

align-items:center;

background:rgba(255,255,255,.45);

backdrop-filter:blur(18px);

box-shadow:0 5px 20px rgba(0,0,0,.05);

z-index:999;

}

.logo{

font-size:34px;

font-weight:700;

color:#ff4f87;

}

nav ul{

display:flex;

list-style:none;

gap:35px;

}

nav ul li a{

text-decoration:none;

font-size:17px;

font-weight:500;

color:#555;

transition:.3s;

}

nav ul li a:hover{

color:#ff4f87;

}

/* Hero */

.hero{

min-height:100vh;

display:flex;

justify-content:space-between;

align-items:center;

padding:120px 8% 60px;

gap:60px;

}

.content{

flex:1;

background:rgba(255,255,255,.45);

backdrop-filter:blur(18px);

padding:60px;

border-radius:35px;

box-shadow:0 20px 40px rgba(0,0,0,.08);

animation:fadeUp 1s;

}

.content span{

font-size:24px;

color:#ff6fa5;

}

.content h1{

font-size:72px;

color:#ff4f87;

margin:15px 0;

}

.content h2{

font-size:28px;

font-weight:400;

margin-bottom:25px;

}

.content p{

font-size:18px;

line-height:1.9;

margin-bottom:35px;

color:#666;

}
/* ปุ่ม */

.buttons{

display:flex;

gap:20px;

margin-top:20px;

}

.btn{

display:inline-block;

padding:14px 32px;

border-radius:50px;

text-decoration:none;

font-size:17px;

font-weight:600;

transition:.35s;

}

.btn-primary{

background:#ff5c99;

color:white;

box-shadow:0 10px 25px rgba(255,92,153,.35);

}

.btn-primary:hover{

transform:translateY(-5px);

background:#ff3f84;

}

.btn-outline{

border:2px solid #ff5c99;

color:#ff5c99;

}

.btn-outline:hover{

background:#ff5c99;

color:white;

}

/* รูปโปรไฟล์ */

.profile{

flex:1;

display:flex;

justify-content:center;

align-items:center;

position:relative;

}

.circle{

width:420px;

height:420px;

border-radius:50%;

background:rgba(255,255,255,.35);

backdrop-filter:blur(20px);

display:flex;

justify-content:center;

align-items:center;

box-shadow:0 20px 50px rgba(255,105,180,.18);

animation:float 4s ease-in-out infinite;

}

.circle::before{

content:"";

position:absolute;

width:450px;

height:450px;

border:3px solid rgba(255,255,255,.8);

border-radius:50%;

animation:pulse 3s infinite;

}

.circle img{

width:360px;

height:360px;

object-fit:cover;

border-radius:50%;

border:8px solid white;

box-shadow:0 10px 30px rgba(0,0,0,.12);

}

/* Animation */

@keyframes float{

0%{transform:translateY(0);}

50%{transform:translateY(-18px);}

100%{transform:translateY(0);}

}

@keyframes pulse{

0%{

transform:scale(1);

opacity:.8;

}

50%{

transform:scale(1.05);

opacity:.4;

}

100%{

transform:scale(1);

opacity:.8;

}

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}

/* Responsive */

@media(max-width:900px){

.hero{

flex-direction:column-reverse;

text-align:center;

padding-top:150px;

}

.content{

padding:40px;

}

.content h1{

font-size:52px;

}

.circle{

width:300px;

height:300px;

}

.circle::before{

width:330px;

height:330px;

}

.circle img{

width:250px;

height:250px;

}

.buttons{

justify-content:center;

}

}
</head>

<p>

</div>

</div>

</div>
